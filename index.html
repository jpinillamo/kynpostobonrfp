<style>
:root{
  --red:#FF462D;
  --red-dark:#E03A22;
  --red-tint:#FFF1EF;
  --black:#000000;
  --ink:#1D1D1D;
  --grey:#5C5C5C;
  --grey-lt:#8A8A8A;
  --line:#E4E1DE;
  --bg:#FFFFFF;
  --bg-2:#F8F7F6;
  --teal:#287079;
  --teal-dark:#1F5A61;
  --teal-tint:#EAF3F4;
  --mono:'IBM Plex Mono',monospace;
  --sans:'TWK Everett','Everett','Instrument Sans',-apple-system,'Segoe UI',sans-serif;
  --disp:'TWK Everett','Everett','Instrument Sans',-apple-system,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;font-size:15.5px}
a{color:inherit;text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:0 32px}
.eyebrow{font-family:var(--sans);font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);font-weight:600;display:block;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line);max-width:780px}
h1,h2,h3,h4,.title,.tab,.pbtn{font-family:var(--disp)}
h2{font-size:clamp(26px,3.2vw,38px);font-weight:700;letter-spacing:-.02em;line-height:1.12;margin-bottom:16px;color:var(--black)}
.lead{color:var(--grey);max-width:780px;font-size:16px;font-weight:300}

/* ICONS */
.ic{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:none}
.ic.sm{width:16px;height:16px}
.ic.lg{width:26px;height:26px}
.icbox{width:42px;height:42px;border-radius:3px;background:var(--red-tint);color:var(--red);display:flex;align-items:center;justify-content:center;flex:none}

/* TOP BLACK BAR */
.topbar{background:var(--black);color:#fff}
.topbar-in{display:flex;align-items:center;gap:20px;height:62px}
.logo-img{height:30px;display:block}
.logo-fallback{display:none;font-family:var(--disp);font-weight:700;font-size:26px;color:var(--red);letter-spacing:-.02em}
.logo-posto{height:26px;display:block;transform:translateY(-3.5px)}
.topbar .xsep{color:#5C5C5C;font-size:15px;margin:0 -4px}
.topbar .doc{font-size:13.5px;color:#CFCFCF;border-left:1px solid #3A3A3A;padding-left:20px}
.topbar .who{margin-left:auto;font-size:12.5px;color:#CFCFCF}
@media(max-width:720px){.topbar .who{display:none}}

/* RED TAB BAND */
.band{background:var(--red);position:sticky;top:0;z-index:50}
.band-in{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none}
.band-in::-webkit-scrollbar{display:none}
.band .title{color:#fff;font-weight:700;font-size:17px;padding:0 20px 0 0;white-space:nowrap;display:flex;align-items:center;gap:9px}
.tab{background:none;border:none;cursor:pointer;font-size:14px;font-weight:500;color:rgba(255,255,255,.9);padding:16px 14px 13px;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:7px}
.tab .ic{width:16px;height:16px}
.tab:hover{color:#fff;background:rgba(0,0,0,.08)}
.tab.active{color:#fff;border-bottom-color:#fff;background:rgba(0,0,0,.12)}

.burger{display:none;background:none;border:none;cursor:pointer;color:#fff;margin-left:auto;padding:14px 4px 14px 14px}
.burger .ic{width:22px;height:22px}
.mnav{display:none;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 12px 24px rgba(0,0,0,.08)}
.mnav.open{display:block}
.mitem{display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:15px 22px;font-family:var(--sans);font-size:15px;font-weight:500;color:var(--ink);cursor:pointer;text-align:left}
.mitem:last-child{border-bottom:none}
.mitem .ic{width:18px;height:18px;color:var(--grey-lt)}
.mitem.active{color:var(--red);background:var(--red-tint)}
.mitem.active .ic{color:var(--red)}
@media(max-width:820px){
  .band .tab{display:none}
  .burger{display:flex}
  .band .title{padding-right:0}
}

/* PAGES */
.page{display:none;padding:62px 0 80px}
.page.active{display:block}

/* PAGER */
.pager{display:flex;justify-content:space-between;gap:14px;margin-top:62px;border-top:1px solid var(--line);padding-top:26px}
.pbtn{cursor:pointer;border:1.5px solid var(--red);background:#fff;color:var(--red);font-weight:600;font-size:14.5px;padding:12px 22px;border-radius:3px;transition:.15s;display:flex;align-items:center;gap:8px}
.pbtn:hover{background:var(--red);color:#fff}
.pbtn.next{background:var(--red);color:#fff}
.pbtn.next:hover{background:var(--red-dark);border-color:var(--red-dark)}
.pbtn[disabled]{visibility:hidden}

/* HOME */
.hero h1{font-size:clamp(32px,4.6vw,54px);font-weight:700;letter-spacing:-.03em;line-height:1.06;max-width:880px;color:var(--black)}
.hero h1 em{font-style:normal;color:var(--red)}
.path{display:flex;align-items:center;gap:14px;margin-top:40px;font-size:13.5px;flex-wrap:wrap;font-weight:500}
.path .node{border:1px solid var(--line);padding:8px 16px;border-radius:3px;color:var(--grey);display:flex;align-items:center;gap:8px}
.path .node .ic{width:15px;height:15px}
.path .node.dest{border-color:var(--red);color:var(--red-dark);background:var(--red-tint);font-weight:700}
.path .arrow{color:var(--red);font-size:17px}
.hero-meta{margin-top:46px;display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
.meta-card{border:1px solid var(--line);border-radius:3px;padding:18px 20px;background:var(--bg-2);display:flex;gap:14px;align-items:center}
.meta-card b{display:block;color:var(--black);font-size:15.5px;font-weight:600;font-family:var(--disp)}
.meta-card span{font-size:12.5px;color:var(--grey)}
.toc{margin-top:56px}
.toc h3{font-size:13px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--grey-lt);margin-bottom:16px;font-weight:400}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.toc-item{border:1px solid var(--line);border-radius:3px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;background:#fff;transition:.15s;text-align:left;font-family:var(--sans)}
.toc-item:hover{border-color:var(--red);background:var(--red-tint)}
.toc-item b{font-size:15px;font-weight:600;color:var(--black);display:block;font-family:var(--disp)}
.toc-item span{font-size:12.5px;color:var(--grey)}
.toc-item .go{margin-left:auto;color:var(--red)}

/* DOMINIOS */
.grid7{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;margin-top:42px}
.dom{background:#fff;border:1px solid var(--line);border-radius:3px;padding:24px;transition:.15s}
.dom:hover{border-color:var(--red)}
.dom .num{font-family:var(--disp);font-size:30px;font-weight:600;color:var(--line);line-height:1;display:block;margin-bottom:14px;letter-spacing:-.02em}
.dom h3{font-size:16.5px;font-weight:600;margin-bottom:6px;color:var(--black)}
.dom p{font-size:13.5px;color:var(--grey);font-weight:300}

/* LAB */
.lab-quote{border-left:3px solid var(--red);padding:4px 0 4px 22px;margin:32px 0 44px;max-width:820px;font-size:17.5px;font-weight:300;color:var(--grey)}
.lab-quote b{color:var(--black);font-weight:600}
.frentes{columns:2;column-gap:12px}
.frentes details{break-inside:avoid;-webkit-column-break-inside:avoid;display:inline-block;width:100%;margin-bottom:12px}
@media(max-width:820px){.frentes{columns:1}}
details.fr{background:#fff;border:1px solid var(--line);border-radius:3px;overflow:hidden}
details.fr[open]{border-color:var(--red)}
details.fr summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:13px;padding:16px 18px;font-weight:600;font-size:14.5px;color:var(--black);font-family:var(--disp)}
details.fr summary::-webkit-details-marker{display:none}
details.fr summary .idx{font-family:var(--mono);font-size:11px;color:var(--red);display:inline-block;min-width:34px;font-weight:500}
details.fr summary .chev{margin-left:auto;color:var(--grey-lt);transition:transform .25s}
details.fr[open] summary .chev{transform:rotate(90deg);color:var(--red)}
details.fr .body{padding:0 18px 18px 52px;font-size:13.5px;color:var(--grey);font-weight:300}
details.fr .body ul{margin-top:8px;padding-left:16px}
details.fr .body li{margin-bottom:4px}
details.fr .tools{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--sans);font-size:11.5px;border:1px solid var(--line);border-radius:2px;padding:3px 9px;color:var(--grey);background:#fff}

/* METODOLOGIA */
.stages{display:grid;grid-template-columns:repeat(5,1fr);gap:0;margin-top:48px}
@media(max-width:820px){.stages{grid-template-columns:1fr}}
.stage{padding:24px 18px 24px 0;border-top:3px solid var(--line);position:relative}
.stage::before{content:"";position:absolute;top:-7px;left:0;width:11px;height:11px;border-radius:50%;background:var(--red)}
.stage .sico{color:var(--red);margin-bottom:10px}
.stage h4{font-size:15px;font-weight:600;margin:8px 0 6px;color:var(--black)}
.stage .en{font-family:var(--mono);font-size:10.5px;color:var(--teal);letter-spacing:.12em;text-transform:uppercase}
.stage p{font-size:12.5px;color:var(--grey);font-weight:300}
.gantt{margin-top:56px;background:var(--bg-2);border:1px solid var(--line);border-radius:3px;padding:32px 28px;overflow-x:auto}
.gantt h3{font-size:15px;font-weight:600;margin-bottom:4px;color:var(--black);display:flex;align-items:center;gap:9px}
.gantt h3 .ic{color:var(--red)}
.gantt .sub{font-size:12.5px;color:var(--grey-lt);margin-bottom:24px}
.g-table{min-width:760px}
.g-head{display:grid;grid-template-columns:200px repeat(16,1fr);font-family:var(--mono);font-size:10px;color:var(--grey-lt);border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:6px}
.g-head div{text-align:center}
.g-head div:first-child{text-align:left}
.g-row{display:grid;grid-template-columns:200px repeat(16,1fr);align-items:center;height:44px}
.g-row .lbl{font-size:13px;font-weight:600;padding-right:12px;color:var(--black);font-family:var(--disp)}
.g-row .lbl span{display:block;font-family:var(--mono);font-size:9.5px;color:var(--grey-lt);font-weight:400}
.bar{height:12px;border-radius:2px;background:var(--red);grid-row:1}
.bar.ghost{background:#B9D6DA}
.g-note{margin-top:18px;font-size:11.5px;color:var(--grey-lt);font-family:var(--mono)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:56px}
@media(max-width:820px){.two-col{grid-template-columns:1fr}}
.subh{font-size:16px;font-weight:600;color:var(--black);margin-bottom:8px}
.colp{font-size:13.5px;color:var(--grey);font-weight:300;margin-bottom:12px}
.collist{padding-left:18px;font-size:13.5px;color:var(--grey)}
.collist li{margin-bottom:5px}

.cm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.cm{border:1px solid var(--line);border-radius:3px;padding:16px 18px;background:#fff}
.cm b{font-family:var(--disp);font-size:14px;color:var(--black);display:block;margin-bottom:4px}
.cm p{font-size:12.5px;color:var(--grey);font-weight:300}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{border:1px solid var(--line);border-radius:3px;padding:14px 16px;background:var(--bg-2)}
.stat b{font-family:var(--disp);font-size:22px;font-weight:700;color:var(--red);display:block;line-height:1.1}
.stat span{font-size:12px;color:var(--grey)}

.demo-btn{margin-top:14px;background:var(--red);color:#fff;border:none;border-radius:3px;padding:10px 18px;font-family:var(--disp);font-weight:600;font-size:13.5px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.demo-btn:hover{background:var(--red-dark)}
.demo-btn[disabled]{opacity:.6;cursor:wait}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:40px}
@media(max-width:820px){.demo-grid{grid-template-columns:1fr}}
.demo-card{border:1px solid var(--line);border-top:4px solid var(--red);border-radius:3px;padding:26px 24px;background:#fff}
.demo-card h3{font-size:18px;font-weight:600;color:var(--black);margin:8px 0 8px}
.demo-card p{font-size:13.5px;color:var(--grey);font-weight:300}
.demo-card.pending{border-top-color:var(--line);background:var(--bg-2)}
#demo-ov{display:none;position:fixed;inset:0;z-index:200;background:#fff;flex-direction:column}
#demo-ov.open{display:flex}
#demo-ov .dbar{height:52px;background:var(--black);color:#fff;display:flex;align-items:center;gap:16px;padding:0 18px;flex:none}
#demo-ov .dback{background:var(--red);color:#fff;border:none;border-radius:3px;padding:8px 16px;font-family:var(--disp);font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px}
#demo-ov .dback:hover{background:var(--red-dark)}
#demo-ov .dtitle{font-size:13.5px;color:#CFCFCF;font-family:var(--sans)}
#demo-ov iframe{flex:1;border:none;width:100%}
#demo-ov .dload{position:absolute;top:52px;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:#fff;font-size:14px;color:var(--grey);font-family:var(--sans)}

/* ESCENARIOS */
.scen{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:44px}
@media(max-width:820px){.scen{grid-template-columns:1fr}}
.sc{background:#fff;border:1px solid var(--line);border-top:4px solid var(--red);border-radius:3px;padding:28px 24px}
.sc .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal)}
.sc h3{font-size:18.5px;font-weight:600;margin:8px 0 10px;color:var(--black)}
.sc .icbox{margin-bottom:16px}
.sc p{font-size:13.5px;color:var(--grey);font-weight:300}
.sc .fit{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);font-size:12.5px;color:var(--grey)}
.sc .fit b{color:var(--black);font-weight:600}
.criteria{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}

/* TOOLS */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-top:42px}
.tool{border:1px solid var(--line);border-radius:3px;padding:22px;background:#fff;transition:.15s}
.tool:hover{border-color:var(--red)}
.tool .thead{display:flex;align-items:center;gap:13px;margin-bottom:12px}
.tool h4{font-size:15px;font-weight:600;color:var(--black)}
.tool p{font-size:13px;color:var(--grey);font-weight:300}
.tool .src{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);display:block}

/* RESULTADO */
.res-wrap{background:#fff;margin-top:12px}
.res-wrap .eyebrow{color:var(--teal)}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:38px}
.res{background:#fff;border:1px solid var(--line);border-top:4px solid var(--teal);border-radius:3px;padding:22px;transition:.15s}
.res:hover{border-color:var(--teal)}
.res .rico{width:36px;height:36px;border-radius:3px;background:var(--teal-tint);color:var(--teal);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.res h4{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--black)}
.res p{font-size:13px;color:var(--grey);font-weight:300}
.sig-card{margin-top:40px;border:1px solid var(--line);border-radius:3px;padding:28px;display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;background:var(--bg-2)}
.sig-card .person{display:flex;gap:16px;align-items:center}
.sig-card .icbox{background:var(--teal-tint);color:var(--teal);display:flex;align-items:center;justify-content:center}
.sig-card b{display:block;font-size:16.5px;color:var(--black);font-family:var(--disp)}
.sig-card span{font-size:13px;color:var(--grey);display:block}
.sig-card a{color:var(--red);font-size:13px;font-weight:500}
.sig-card .fine{font-size:12.5px;color:var(--grey);max-width:460px;font-weight:300}

/* ACENTOS TEAL EN TODAS LAS HOJAS */
.hero-meta .meta-card:nth-child(even) .icbox{background:var(--teal-tint);color:var(--teal)}
.toc-item:nth-child(even) .icbox{background:var(--teal-tint);color:var(--teal)}
.toc-item:nth-child(even):hover{border-color:var(--teal);background:var(--teal-tint)}
.toc-item:nth-child(even) .go{color:var(--teal)}
.grid7 .dom:nth-child(even) .icbox{background:var(--teal-tint);color:var(--teal)}
.grid7 .dom:nth-child(even):hover{border-color:var(--teal)}
.frentes details:nth-child(even) summary .fico{background:var(--teal-tint);color:var(--teal)}
.frentes details:nth-child(even)[open]{border-color:var(--teal)}
.frentes details:nth-child(even)[open] summary .chev{color:var(--teal)}
.stage:nth-child(even)::before{background:var(--teal)}
.stage:nth-child(even) .sico{color:var(--teal)}
.sc .icbox{background:var(--teal-tint);color:var(--teal)}
.path .node:nth-child(3){border-color:var(--teal);color:var(--teal-dark);background:var(--teal-tint)}
.tool:nth-child(even) .icbox{background:var(--teal-tint);color:var(--teal)}
.tool:nth-child(even):hover{border-color:var(--teal)}

/* LOGIN */
#login{position:fixed;inset:0;z-index:100;background:var(--bg-2);display:flex;align-items:center;justify-content:center;padding:24px}
#login .card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 18px 50px rgba(0,0,0,.08)}
#login .lgrow{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:26px}
#login .lg{height:30px;display:block}
#login .lgp{height:26px;display:block;transform:translateY(-3.5px)}
#login .lgx{color:var(--grey-lt);font-size:15px}
#login h2{font-size:22px;margin-bottom:4px}
#login .sub{font-size:13.5px;color:var(--grey);margin-bottom:26px}
#login label{display:block;font-size:12.5px;font-weight:600;color:var(--black);margin:14px 0 6px;font-family:var(--disp)}
#login input{width:100%;border:1.5px solid var(--line);border-radius:3px;padding:11px 14px;font-family:var(--sans);font-size:14.5px;outline:none;transition:.15s}
#login input:focus{border-color:var(--red)}
#login .pwrap{position:relative}
#login .pwrap input{padding-right:44px}
#login input::-ms-reveal,#login input::-ms-clear{display:none}
#login .eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:7px;color:var(--grey-lt);display:flex;align-items:center;border-radius:3px;transition:.15s}
#login .eye:hover{color:var(--red)}
#login .go{width:100%;margin-top:24px;background:var(--red);color:#fff;border:none;border-radius:3px;padding:13px;font-family:var(--disp);font-weight:600;font-size:15px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
#login .go:hover{background:var(--red-dark)}
#login .err{display:none;margin-top:14px;background:var(--red-tint);border:1px solid var(--red);color:var(--red-dark);border-radius:3px;padding:9px 13px;font-size:12.5px;align-items:center;gap:8px}
#login .hint{margin-top:20px;font-size:11.5px;color:var(--grey-lt);text-align:center;font-family:var(--mono)}
#login .hint:empty{display:none}
#login .err{flex-wrap:wrap}
#login .err small{display:block;width:100%;margin-top:4px;font-family:var(--mono);font-size:10.5px;color:var(--red-dark);opacity:.8;word-break:break-all}
.logout{margin-left:16px;background:none;border:1px solid #3A3A3A;color:#CFCFCF;border-radius:100px;padding:6px 14px;font-family:var(--sans);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.logout:hover{border-color:var(--red);color:#fff}

/* FOOTER */
.footer{background:var(--red);color:#fff;padding:18px 0;font-size:12.5px}
.footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
</style>
</head>

<!-- LOGIN -->

function ub64(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function deriveKey(u,p){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(u+'|'+p),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:ub64(ENC.salt),iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
}
function showErr(msg,detail){
  var e=document.getElementById('lerr');
  e.style.display='flex';
  e.querySelector('span').textContent=msg;
  e.querySelector('small').textContent=detail||'';
}
async function tryLogin(){
  var u=document.getElementById('lu').value.trim().toLowerCase();
  var p=document.getElementById('lp').value;
  var btn=document.querySelector('#login .go');
  btn.disabled=true;btn.style.opacity=.6;
  var txt=btn.childNodes[0];var prev=txt.textContent;txt.textContent='Verificando\u2026 ';
  await new Promise(function(r){setTimeout(r,30)});
  try{
    if(!ENC.data||ENC.data.length<1000){
      showErr('El archivo est\u00e1 incompleto o se corrompi\u00f3 al subirlo. Vuelve a subir el HTML original sin editarlo.');
      return;
    }
    var ptBytes;
    if(window.crypto&&window.crypto.subtle){
      var key=await deriveKey(u,p);
      ptBytes=await crypto.subtle.decrypt({name:'AES-GCM',iv:ub64(ENC.iv)},key,ub64(ENC.data));
    }else{
      // Respaldo en JS puro (funciona en http://). Puede tardar unos segundos.
      ptBytes=window.__kynDecrypt(new TextEncoder().encode(u+'|'+p),ub64(ENC.salt),ub64(ENC.iv),ub64(ENC.data));
    }
    document.getElementById('app').innerHTML=new TextDecoder().decode(ptBytes);
    window.__sess={u:u,p:p};
    document.getElementById('login').style.display='none';
    document.getElementById('lp').value='';
    bindApp();
  }catch(e){
    console.error('[login] '+e.name+': '+e.message);
    if(e.name==='OperationError'||/invalid|tag|authenticat/i.test(e.message||'')){
      showErr('Usuario o contrase\u00f1a incorrectos.');
    }else if(e.name==='InvalidCharacterError'){
      showErr('Los datos cifrados se da\u00f1aron al subir el archivo. Sube el HTML original de nuevo.',e.name+': '+e.message);
    }else{
      showErr('Error t\u00e9cnico en este navegador:',e.name+': '+e.message+' \u00b7 URL: '+location.protocol+'//'+location.host);
    }
    document.getElementById('lp').value='';
    document.getElementById('lp').focus();
  }finally{
    btn.disabled=false;btn.style.opacity=1;txt.textContent=prev;
  }
}
function goTo(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.toggle('active',p.id===id)});
  document.querySelectorAll('.tab,.mitem').forEach(function(t){t.classList.toggle('active',t.dataset.page===id)});
  var mn=document.getElementById('mnav'),bg=document.getElementById('burger');
  if(mn){mn.classList.remove('open')}
  if(bg){bg.setAttribute('aria-expanded','false');bg.querySelector('use').setAttribute('href','#i-menu')}
  window.scrollTo({top:0,behavior:'instant'});
}
function bindApp(){
  document.querySelectorAll('[data-page]').forEach(function(el){
    el.addEventListener('click',function(){goTo(el.dataset.page)});
  });
  var lo=document.querySelector('.logout');
  if(lo)lo.addEventListener('click',logout);
  document.querySelectorAll('.demo-btn').forEach(function(b){
    b.addEventListener('click',function(){openDemo(b.dataset.demo,b.dataset.title,b)});
  });
  var bg=document.getElementById('burger'),mn=document.getElementById('mnav');
  if(bg&&mn)bg.addEventListener('click',function(){
    var open=mn.classList.toggle('open');
    bg.setAttribute('aria-expanded',open?'true':'false');
    bg.querySelector('use').setAttribute('href',open?'#i-menu-x':'#i-menu');
  });
}
function logout(){
  window.__sess=null;
  closeDemo();
  document.getElementById('app').innerHTML='';
  document.getElementById('login').style.display='flex';
  document.getElementById('lu').value='';document.getElementById('lp').value='';
  document.getElementById('lerr').style.display='none';
}
function togglePw(){
  var i=document.getElementById('lp');
  var show=i.type==='password';
  i.type=show?'text':'password';
  document.querySelector('#eyeic use').setAttribute('href',show?'#i-eyeoff':'#i-eye');
  i.focus();
}
(function(){
  if(!window.crypto||!window.crypto.subtle){
    var hint=document.querySelector('#login .hint');
    if(hint)hint.textContent='Modo compatible activo \u00b7 la verificaci\u00f3n puede tardar unos segundos';
  }
})();
var __demoCache={};
async function openDemo(file,title,btn){
  if(!window.__sess){alert('Sesi\u00f3n no disponible. Vuelve a iniciar sesi\u00f3n.');return}
  var ov=document.getElementById('demo-ov'),fr=document.getElementById('demo-frame'),ld=document.getElementById('demo-load');
  document.getElementById('demo-title').textContent=title||'Demo';
  ov.classList.add('open');document.body.style.overflow='hidden';
  if(__demoCache[file]){fr.src=__demoCache[file];ld.style.display='none';return}
  ld.style.display='flex';fr.src='about:blank';
  if(btn){btn.disabled=true}
  try{
    var r=await fetch(file);
    if(!r.ok)throw new Error('No se pudo descargar '+file+' ('+r.status+')');
    var pj=await r.json();
    var gzBytes;
    if(window.crypto&&window.crypto.subtle){
      var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(window.__sess.u+'|'+window.__sess.p),'PBKDF2',false,['deriveKey']);
      var k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:ub64(pj.salt),iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
      gzBytes=new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:ub64(pj.iv)},k,ub64(pj.data)));
    }else{
      gzBytes=window.__kynDecrypt(new TextEncoder().encode(window.__sess.u+'|'+window.__sess.p),ub64(pj.salt),ub64(pj.iv),ub64(pj.data));
    }
    var htmlText;
    if(pj.gz){
      if(!window.DecompressionStream)throw new Error('Este navegador no soporta descompresi\u00f3n (DecompressionStream).');
      var ds=new DecompressionStream('gzip');
      var stream=new Blob([gzBytes]).stream().pipeThrough(ds);
      htmlText=await new Response(stream).text();
    }else{
      htmlText=new TextDecoder().decode(gzBytes);
    }
    var url=URL.createObjectURL(new Blob([htmlText],{type:'text/html'}));
    __demoCache[file]=url;
    fr.src=url;
    fr.onload=function(){ld.style.display='none'};
  }catch(e){
    console.error('[demo]',e);
    ld.textContent='No se pudo abrir la demo: '+e.message+' \u00b7 Si abriste el archivo en local, la demo requiere servirse desde el sitio (GitHub Pages).';
  }finally{
    if(btn){btn.disabled=false}
  }
}
function closeDemo(){
  var ov=document.getElementById('demo-ov');
  ov.classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('lp').addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin()});
document.getElementById('lu').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('lp').focus()});
</script>
